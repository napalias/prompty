name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-release:
    name: Build Release DMG
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Archive
        run: |
          xcodebuild archive \
            -scheme Prompty \
            -destination 'generic/platform=macOS' \
            -archivePath Prompty.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Export app
        run: |
          xcodebuild -exportArchive \
            -archivePath Prompty.xcarchive \
            -exportPath Export/ \
            -exportOptionsPlist ExportOptions.plist

      - name: Create DMG
        run: |
          hdiutil create -volname Prompty \
            -srcfolder Export/Prompty.app \
            -ov -format UDZO \
            Prompty-${{ github.ref_name }}.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Prompty-${{ github.ref_name }}.dmg
          generate_release_notes: true
